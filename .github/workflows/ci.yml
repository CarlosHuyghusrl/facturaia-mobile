name: FacturaIA CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.brain/**'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Jest tests
        run: npx jest --ci --coverage --forceExit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck 2>&1 || true
        # Non-blocking for now - track type errors without failing CI

  build-android:
    name: Android Build Check
    runs-on: ubuntu-latest
    needs: [test]
    # Only run on push to main, not on PRs (saves CI minutes)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android Release
        run: cd android && ./gradlew assembleRelease
        env:
          # Use debug keystore in CI (release keystore is local only)
          CI: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14
