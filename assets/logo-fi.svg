<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Fondo blanco -->
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Monograma FI centrado -->
  <!-- Centro del canvas = 400px. Grupo FI centrado. -->
  <!-- F ocupa aprox 160px ancho, I aprox 60px ancho, separacion 25px -->
  <!-- Total ancho: 160 + 25 + 60 = 245px. Inicio: 400 - 245/2 = 277.5 -->

  <g fill="#2563EB">

    <!-- Letra F (serif elegante dibujada con paths) -->
    <!-- Alto: 280px, ancho aprox 160px. Top: 70px -->
    <!-- Trazo vertical izquierdo -->
    <rect x="277" y="70" width="22" height="280" rx="1"/>
    <!-- Barra superior (serif extendida) -->
    <rect x="265" y="70" width="175" height="22" rx="1"/>
    <!-- Serif superior en esquina superior izquierda -->
    <rect x="255" y="70" width="14" height="8" rx="1"/>
    <!-- Barra media -->
    <rect x="277" y="188" width="140" height="20" rx="1"/>
    <!-- Serif inferior del trazo vertical (pie) -->
    <rect x="255" y="342" width="52" height="8" rx="1"/>
    <!-- Serif terminal barra superior derecha -->
    <rect x="428" y="70" width="14" height="8" rx="1"/>
    <!-- Serif terminal barra media derecha -->
    <rect x="405" y="200" width="14" height="8" rx="1"/>

    <!-- Letra I (serif elegante dibujada con paths) -->
    <!-- Alto: 280px, ancho total aprox 80px. Inicio: 277+160+25=462 -->
    <!-- Trazo vertical central -->
    <rect x="491" y="70" width="22" height="280" rx="1"/>
    <!-- Serif superior (barra horizontal) -->
    <rect x="462" y="70" width="80" height="20" rx="1"/>
    <!-- Serif inferior (barra horizontal) -->
    <rect x="462" y="330" width="80" height="20" rx="1"/>
    <!-- Serif puntas superior izquierda -->
    <rect x="452" y="70" width="14" height="8" rx="1"/>
    <!-- Serif puntas superior derecha -->
    <rect x="538" y="70" width="14" height="8" rx="1"/>
    <!-- Serif puntas inferior izquierda -->
    <rect x="452" y="342" width="14" height="8" rx="1"/>
    <!-- Serif puntas inferior derecha -->
    <rect x="538" y="342" width="14" height="8" rx="1"/>

  </g>

  <!-- Texto "facturIA" centrado, serif elegante -->
  <text
    x="400"
    y="430"
    font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="400"
    fill="#2563EB"
    text-anchor="middle"
    letter-spacing="4"
  >facturIA</text>

  <!-- Doble línea subrayado debajo del texto -->
  <!-- Primera línea -->
  <line x1="155" y1="450" x2="645" y2="450" stroke="#2563EB" stroke-width="2.5"/>
  <!-- Segunda línea -->
  <line x1="155" y1="462" x2="645" y2="462" stroke="#2563EB" stroke-width="2.5"/>

</svg>
