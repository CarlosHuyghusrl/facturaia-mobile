<!-- FacturaIA Logo — Variante C: Receipt Check -->
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="darkSide" x1="0" y1="0" x2="100" y2="0">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
  </defs>

  <!-- SOMBRA (F oscura detrás) -->
  <g style="opacity: 0.72;" transform="translate(14, 14)">
    <path d="M20 20 H70 C75.5 20 80 24.5 80 30 V98" stroke="url(#darkSide)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="20" y="46" width="53" height="12" rx="6" fill="url(#darkSide)"/>
    <g><circle cx="70" cy="70" r="10" fill="url(#darkSide)"/></g>
  </g>

  <!-- CARA FRONTAL (F cyan) -->
  <g>
    <path d="M20 20 H70 C75.5 20 80 24.5 80 30 V98" stroke="url(#mainGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="20" y="46" width="53" height="12" rx="6" fill="url(#mainGrad)"/>
    <g transform="translate(70, 70)">
      <circle r="10" fill="#3B82F6"/>
      <!-- Mini recibo (rectángulo con borde ondulado abajo) -->
      <path d="M-3 -5.5 H3 V3.5 L2 2.5 L1 3.5 L0 2.5 L-1 3.5 L-2 2.5 L-3 3.5 Z" stroke="white" stroke-width="0.8" fill="none"/>
      <!-- Líneas de texto en el recibo -->
      <line x1="-1.5" y1="-3" x2="1.5" y2="-3" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
      <line x1="-1.5" y1="-1" x2="1.5" y2="-1" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
      <!-- Checkmark -->
      <path d="M-1 1 L0 2 L2 -0.5" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
</svg>
